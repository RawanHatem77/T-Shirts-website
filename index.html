<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Smart Size Finder</title>

<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="buttons.css">
<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="background"></div>

<!-- LANGUAGE SWITCH -->
<select class="lang-switch" id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">AR</option>
    <option value="en">EN</option>
</select>

<div class="container">

<div class="text-section">

<h1 class="title" data-key="title"></h1>

<p class="description" data-key="desc"></p>

<div class="buttons">

<button class="btn primary" data-key="login" onclick="goLogin()"></button>
<button class="btn outline" data-key="signup" onclick="goSignup()"></button>
<button class="btn ghost" data-key="guest" onclick="goViewer()"></button>

</div>

</div>

<div class="model-section">
<img src="Smart size recommendation system demo.png" class="model-img">
</div>

</div>

<script src="lang.js"></script>
<script src="index.js"></script>

</body>
</html>
